<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILZX AI - Chat Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0a1a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            min-height: 100vh;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            background: rgba(20, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text h2 {
            font-size: 20px;
            color: #fff;
        }

        .logo-text p {
            font-size: 12px;
            color: #8b8ca8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f1222;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #2a2d44;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .user-email {
            color: #fff;
            font-size: 13px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .message.assistant .message-bubble {
            background: #0f1222;
            border: 1px solid #2a2d44;
            color: #e0e0e0;
            border-radius: 20px 20px 20px 4px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
        }

        .message.user .message-avatar {
            background: #2a2d44;
            order: 2;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            background: rgba(20, 25, 45, 0.95);
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: #0f1222;
            border: 1px solid #2a2d44;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .send-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background: #0f1222;
            border: 1px solid #2a2d44;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 20px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h2>DILZX AI</h2>
                    <p>Powered by OpenRouter</p>
                </div>
            </div>
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-email" id="userEmail">Loading...</div>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-bubble">
                    Hello! I'm DILZX AI, powered by advanced AI models.<br>
                    Ask me anything! What can I help you with today?
                </div>
            </div>
        </div>

        <div class="typing" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ask DILZX AI anything..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let userEmail = '';
        const API_KEY = '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';

        // Get email from URL
        const urlParams = new URLSearchParams(window.location.search);
        userEmail = urlParams.get('email') || 'User';
        document.getElementById('userEmail').innerText = userEmail;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            // Show typing indicator
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const response = await fetch('/api/ai', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        email: userEmail
                    })
                });

                const data = await response.json();
                
                typingIndicator.style.display = 'none';
                
                if (data.success) {
                    addMessage(data.reply, 'assistant');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessage('Network error. Please check your connection.', 'assistant');
            }

            sendBtn.disabled = false;
            scrollToBottom();
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = sender === 'user' ? '👤' : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
